<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c2c2f"/>
      <stop offset="1" stop-color="#161618"/>
    </linearGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE45C"/>
      <stop offset="1" stop-color="#FFD60A"/>
    </linearGradient>
  </defs>

  <!-- App background -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>

  <!-- Filmstrip body -->
  <rect x="64" y="176" width="384" height="160" rx="20" fill="#0e0e10"/>

  <!-- Sprocket holes, top and bottom -->
  <g fill="#2c2c2f">
    <rect x="92"  y="192" width="36" height="20" rx="6"/>
    <rect x="156" y="192" width="36" height="20" rx="6"/>
    <rect x="220" y="192" width="36" height="20" rx="6"/>
    <rect x="284" y="192" width="36" height="20" rx="6"/>
    <rect x="348" y="192" width="36" height="20" rx="6"/>
    <rect x="92"  y="300" width="36" height="20" rx="6"/>
    <rect x="156" y="300" width="36" height="20" rx="6"/>
    <rect x="220" y="300" width="36" height="20" rx="6"/>
    <rect x="284" y="300" width="36" height="20" rx="6"/>
    <rect x="348" y="300" width="36" height="20" rx="6"/>
  </g>

  <!-- Frames in the unselected (dimmed) regions -->
  <g fill="#3a3a3e">
    <rect x="84"  y="224" width="76" height="64" rx="8"/>
    <rect x="352" y="224" width="76" height="64" rx="8"/>
  </g>

  <!-- Selected region: brighter frames between the handles -->
  <g fill="#5a5a60">
    <rect x="180" y="224" width="68" height="64" rx="8"/>
    <rect x="264" y="224" width="68" height="64" rx="8"/>
  </g>

  <!-- Yellow trim handles bracketing the selection -->
  <g fill="url(#handle)">
    <rect x="156" y="160" width="28" height="192" rx="12"/>
    <rect x="328" y="160" width="28" height="192" rx="12"/>
  </g>

  <!-- Grip notches on the handles -->
  <g fill="#161618" opacity="0.55">
    <rect x="167" y="240" width="6" height="32" rx="3"/>
    <rect x="339" y="240" width="6" height="32" rx="3"/>
  </g>
</svg>
